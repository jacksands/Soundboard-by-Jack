<div style="padding:14px;font-size:13px;">

    <h3 style="margin:0 0 6px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;">Sound Mode</h3>
    <div style="background:#f0f0f0;border-radius:6px;padding:10px 12px;margin-bottom:14px;">
        <p style="font-size:11px;color:#555;margin:0 0 8px;">
            ℹ️ Players always hear sounds played by the GM. This setting only controls <b>which sounds players can trigger themselves</b>.
        </p>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:6px;">
            <input type="radio" name="pm-mode" id="pm-mode-select" value="shared"
                   {{#if (eq mode 'shared')}}checked{{/if}}
                   onchange="game.settings.set('SoundBoard','playerSoundboardMode','shared')">
            <span>
                <b>GM Folder</b> — players can trigger sounds from the same folder as the GM<br>
                <small style="color:#666;">Current GM folder: <code>{{gmDir}}</code></small>
            </span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="radio" name="pm-mode" value="folder"
                   {{#if (eq mode 'folder')}}checked{{/if}}
                   onchange="game.settings.set('SoundBoard','playerSoundboardMode','folder')">
            <span>
                <b>Personal Folder</b> — each player sets their own sounds folder inside their SoundBoard window
            </span>
        </label>
    </div>

    <h3 style="margin:0 0 6px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;">Player Access</h3>
    <p style="font-size:11px;color:#666;margin-bottom:8px;">Toggle which players can open a personal SoundBoard.</p>

    {{#each players}}
    <div style="display:flex;align-items:center;gap:8px;margin:4px 0;padding:7px 10px;background:#f0f0f0;border-radius:6px;">
        <span style="flex:1;font-weight:600;">{{name}}</span>
        <button type="button" class="btn btn-sm sb-pm-access-toggle {{#if hasAccess}}btn-success active{{else}}btn-outline-secondary{{/if}}"
                data-user-id="{{id}}" style="font-size:11px;padding:3px 10px;min-width:110px;">
            {{#if hasAccess}}✓ Has Access{{else}}✗ No Access{{/if}}
        </button>
    </div>
    {{else}}
    <p style="color:#888;font-size:12px;">No non-GM players found.</p>
    {{/each}}

</div>
